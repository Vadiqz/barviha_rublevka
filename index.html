<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ОМВД Барвиха-Северное</title>
    <style>
        body{background:#0a0e17;color:#fff;font-family:Arial;padding:20px;max-width:900px;margin:0 auto}
        .card{background:#141c28;border:1px solid #1c2533;border-radius:10px;padding:15px;margin:10px 0;display:flex;gap:15px;align-items:center}
        .card img{width:80px;height:80px;border-radius:50%;object-fit:cover}
        .info{flex:1}
        .info h3{margin:0}
        .info p{margin:3px 0;color:#8896a8;font-size:14px}
        .tag{background:#0071e3;padding:2px 10px;border-radius:12px;font-size:11px;display:inline-block}
        .btn{background:#0071e3;border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer}
        .btn:hover{background:#005bb5}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        .nav{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap}
        .nav button{background:#141c28;border:1px solid #1c2533;color:#fff;padding:8px 20px;border-radius:20px;cursor:pointer}
        .nav button.active{background:#0071e3}
        .hidden{display:none}
        .login-box{background:#141c28;border:1px solid #1c2533;border-radius:10px;padding:30px;max-width:350px;margin:50px auto}
        .login-box input{width:100%;padding:10px;background:#0a0e17;border:1px solid #1c2533;color:#fff;border-radius:6px;margin:5px 0}
        .login-box .btn{width:100%}
    </style>
</head>
<body>

    <!-- ЛОГИН -->
    <div id="loginScreen">
        <div class="login-box">
            <h2 style="text-align:center">🚔 ОМВД Барвиха</h2>
            <p style="text-align:center;color:#8896a8">Вход в систему</p>
            <input type="text" id="loginUser" placeholder="Логин" value="admin">
            <input type="password" id="loginPass" placeholder="Пароль" value="admin123">
            <button class="btn" onclick="login()">Войти</button>
            <p style="text-align:center;color:#5d6a7a;font-size:12px;margin-top:10px">admin / admin123</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ САЙТ -->
    <div id="mainSite" style="display:none">
        <h1>🚔 ОМВД «Барвиха-Северное»</h1>
        <p style="color:#8896a8">Управление внутренних дел</p>
        
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin:10px 0">
            <span>👮 Персонажей: <b id="staffCount">0</b></span>
            <span>📋 Дел: <b id="casesCount">0</b></span>
            <span>✅ Раскрыто: <b id="solvedCount">0</b></span>
            <button class="btn" onclick="logout()" style="background:#e74c3c">Выйти</button>
        </div>

        <div class="nav">
            <button class="active" onclick="showTab('staff')">Персонажи</button>
            <button onclick="showTab('cases')">Дела</button>
        </div>

        <!-- Персонажи -->
        <div id="staffTab">
            <div id="staffGrid" class="grid"></div>
        </div>

        <!-- Дела -->
        <div id="casesTab" class="hidden">
            <div id="casesList"></div>
        </div>
    </div>

    <script>
        // ======= ДАННЫЕ =======
        const characters = [
            { name: 'Владимир Яковлев', rank: 'Полковник', position: 'Начальник ОМВД', car: 'Nissan Teana', solved: 45, img: 'https://i.pravatar.cc/150?img=1' },
            { name: 'Григорий Измайлов', rank: 'Капитан', position: 'Начальник уголовного розыска', car: 'Mercedes E-Class', solved: 47, img: 'https://i.pravatar.cc/150?img=2' },
            { name: 'Олег Елисеев', rank: 'Капитан', position: 'Оперуполномоченный', car: 'Ford Focus', solved: 25, img: 'https://i.pravatar.cc/150?img=3' },
            { name: 'Александр Савельев', rank: 'Ст. лейтенант', position: 'Оперуполномоченный', car: 'ВАЗ-2109', solved: 22, img: 'https://i.pravatar.cc/150?img=4' },
            { name: 'Игорь Мухич', rank: 'Капитан юстиции', position: 'Старший следователь', car: 'Chrysler PT Cruiser', solved: 35, img: 'https://i.pravatar.cc/150?img=5' },
            { name: 'Мария Гудкова', rank: 'Ст. лейтенант юстиции', position: 'Следователь', car: 'Hyundai Solaris', solved: 18, img: 'https://i.pravatar.cc/150?img=6' },
            { name: 'Алёна', rank: '—', position: 'Совладелица кофеен, жена Гриши', car: 'Porsche Macan', solved: 0, img: 'https://i.pravatar.cc/150?img=7' },
            { name: 'Кристина', rank: '—', position: 'Сексолог, совладелица кафе', car: 'BMW 4-Series', solved: 0, img: 'https://i.pravatar.cc/150?img=8' },
            { name: 'Вероника Измайлова', rank: '—', position: 'Автомеханик, сестра Гриши', car: 'Чоппер', solved: 0, img: 'https://i.pravatar.cc/150?img=9' }
        ];

        const casesList = [
            { number: 'УД-2025-017', title: 'Барвихинский стрелок', article: 'ст. 105 УК РФ', status: '✅ Раскрыто' },
            { number: 'УД-2026-1024', title: 'Кража часов в Жуковке', article: 'ст. 158 УК РФ', status: '🔄 В работе' },
            { number: 'УД-2026-1025', title: 'Угон Porsche в Luxury Village', article: 'ст. 166 УК РФ', status: '✅ Раскрыто' },
            { number: 'УД-2024-891', title: 'Мошенничество в Рублёвке', article: 'ст. 159 УК РФ', status: '❌ Закрыто' }
        ];

        // ======= ФУНКЦИИ =======
        function renderStaff() {
            const grid = document.getElementById('staffGrid');
            grid.innerHTML = characters.map(c => `
                <div class="card">
                    <img src="${c.img}" onerror="this.src='https://i.pravatar.cc/150?img=1'">
                    <div class="info">
                        <h3>${c.name}</h3>
                        <p>${c.rank} • ${c.position}</p>
                        <p>🚗 ${c.car} • 📌 ${c.solved} дел</p>
                        <span class="tag">${c.rank.includes('Начальник') ? 'Руководство' : 'Сотрудник'}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('staffCount').textContent = characters.length;
        }

        function renderCases() {
            const list = document.getElementById('casesList');
            list.innerHTML = casesList.map(c => `
                <div class="card" style="flex-direction:column;align-items:stretch">
                    <div style="display:flex;justify-content:space-between">
                        <b>${c.number}</b>
                        <span style="color:#2ecc71">${c.status}</span>
                    </div>
                    <h4>${c.title}</h4>
                    <p style="color:#8896a8">${c.article}</p>
                </div>
            `).join('');
            document.getElementById('casesCount').textContent = casesList.length;
            const solved = casesList.filter(c => c.status.includes('Раскрыто') || c.status.includes('Закрыто')).length;
            document.getElementById('solvedCount').textContent = solved;
        }

        function showTab(tab) {
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            if (tab === 'staff') {
                document.querySelector('.nav button:first-child').classList.add('active');
                document.getElementById('staffTab').classList.remove('hidden');
                document.getElementById('casesTab').classList.add('hidden');
            } else {
                document.querySelector('.nav button:last-child').classList.add('active');
                document.getElementById('casesTab').classList.remove('hidden');
                document.getElementById('staffTab').classList.add('hidden');
            }
        }

        function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if (user === 'admin' && pass === 'admin123') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainSite').style.display = 'block';
                renderStaff();
                renderCases();
            } else {
                alert('Неверный логин или пароль!');
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('mainSite').style.display = 'none';
        }
    </script>

</body>
</html>
