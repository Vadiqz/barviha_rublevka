<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ОМВД | Система Оперативного Управления</title>
    <style>
        body { background: #0c0f16; color: #cfd8dc; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #455a64; padding: 20px; background: #131720; }
        .header { border-bottom: 2px solid #546e7a; padding-bottom: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #000; color: #00ff00; border: 1px solid #333; padding: 10px; }
        .btn-group { margin: 20px 0; }
        button { background: #263238; color: white; border: 1px solid #546e7a; padding: 10px 20px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #37474f; }
        .log { border: 1px solid #333; padding: 15px; background: #000; min-height: 200px; color: #fff; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ОМВД «Барвиха-Северное» | Электронный журнал</h2>
        <p>Статус: <span id="status">Ожидание вызова</span> | Бюджет: <span id="budget">5,000,000</span> ₽</p>
    </div>

    <div id="game-area">
        <button onclick="startMission('patrol')">Патруль Рублевки</button>
        <button onclick="startMission('raid')">Облава на казино</button>
    </div>

    <div style="margin-top: 20px;">
        <p>Оперативный рапорт (редактируй для подачи начальнику):</p>
        <textarea id="report">Дата: 06.07.2026
Сотрудник: Измайлов Г.А.
Дело: 
Описание: </textarea>
        <button onclick="submitReport()" style="background: #1b5e20;">ПОДАТЬ РАПОРТ НА СТОЛ</button>
    </div>

    <div class="log" id="log">Система активна. Жду указаний...</div>
</div>

<script>
    let budget = 5000000;
    let currentMission = null;

    function log(text) {
        document.getElementById('log').innerHTML += `<br>> ${text}`;
    }

    function startMission(type) {
        currentMission = type;
        if (type === 'patrol') {
            log("Вы завели двигатель служебной машины (о001оо77). Едете по Рублевке.");
            log("Видите странный автомобиль, совершающий опасные маневры. Ваши действия?");
            document.getElementById('game-area').innerHTML = `
                <button onclick="choice('patrol_stop')">Остановить и проверить документы</button>
                <button onclick="choice('patrol_ignore')">Игнорировать и ехать дальше</button>
            `;
        } else if (type === 'raid') {
            log("Вы стоите у входа в подпольное казино. Внутри шум, музыка и запах денег.");
            document.getElementById('game-area').innerHTML = `
                <button onclick="choice('raid_force')">Ворваться с оружием</button>
                <button onclick="choice('raid_doc')">Предъявить ордер через черный ход</button>
            `;
        }
    }

    function choice(c) {
        if (c === 'patrol_stop') {
            log("Вы прижали авто к обочине. Внутри пьяный мажор. Он предлагает 'решить вопрос' за 50 000 рублей.");
            log("Что делаем? [Взятка / Задержание]");
            document.getElementById('game-area').innerHTML = `
                <button onclick="finish('bribe')">Взять деньги</button>
                <button onclick="finish('arrest')">Задержать по всей строгости</button>
            `;
        } else if (c === 'raid_force') {
            log("Ворвались! Началась суматоха, кто-то пытается сбежать через окно. Вы задержали организатора.");
            finish('success');
        }
    }

    function finish(result) {
        let reward = 0;
        if (result === 'bribe') { reward = 50000; log("Деньги в кармане. Рапорт писать не придется. Преступник уехал."); }
        else if (result === 'arrest') { reward = 10000; budget += 200000; log("Мажор в камере, рапорт готов. В бюджет ОМВД зачислено 200к."); }
        else if (result === 'success') { reward = 50000; budget += 500000; log("Казино закрыто. Рапорт о задержании принят."); }
        
        document.getElementById('budget').innerText = budget.toLocaleString();
        document.getElementById('game-area').innerHTML = `<button onclick="location.reload()">Вернуться в штаб</button>`;
        document.getElementById('report').value += `\nРезультат: ${result}. Награда: ${reward} руб.`;
    }

    function submitReport() {
        alert("Рапорт подан на стол начальнику. Ожидайте начисления зарплаты!");
    }
</script>
</body>
</html>
