    <style>
        /* ============================================================
           БАЗОВЫЕ СТИЛИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #070b12;
            color: #e8ecf1;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ============================================================
           ОСНОВНОЙ КОНТЕЙНЕР
           ============================================================ */
        #game {
            max-width: 1100px;
            width: 100%;
            background: #0e1622;
            border-radius: 24px;
            padding: 20px 18px 28px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* ============================================================
           ХЕДЕР
           ============================================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 18px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #5b9aff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header .badge {
            background: #1a2636;
            color: #7aa9ff;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(122, 169, 255, 0.12);
        }

        /* ============================================================
           СТАТУС-БАР (HUD)
           ============================================================ */
        .hud {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 8px;
            background: #0b121d;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .hud-item {
            text-align: center;
        }

        .hud-item .value {
            font-size: 22px;
            font-weight: 700;
            color: #5b9aff;
            line-height: 1.2;
        }

        .hud-item .label {
            font-size: 10px;
            color: #7a8aa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hud-item .value.danger {
            color: #f06a6a;
        }
        .hud-item .value.warning {
            color: #f0b34b;
        }
        .hud-item .value.success {
            color: #4caf84;
        }

        /* ============================================================
           ВКЛАДКИ
           ============================================================ */
        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #7a8aa3;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn:hover {
            color: #e8ecf1;
            background: #1a2636;
        }

        .tab-btn.active {
            color: #fff;
            background: #1f2d42;
            box-shadow: inset 0 0 0 1px rgba(91, 154, 255, 0.15);
        }

        /* ============================================================
           КОНТЕНТ ВКЛАДОК
           ============================================================ */
        .tab-content {
            display: none;
            animation: fadeUp 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           КАРТОЧКИ
           ============================================================ */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .grid-1 {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: #0b121d;
            border-radius: 14px;
            padding: 14px 16px 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.2s;
            cursor: default;
        }

        .card:hover {
            background: #111c2b;
            border-color: rgba(91, 154, 255, 0.1);
        }

        .card .title {
            font-size: 15px;
            font-weight: 600;
        }

        .card .sub {
            font-size: 12px;
            color: #7a8aa3;
            margin-top: 2px;
        }

        .card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            font-size: 12px;
            color: #7a8aa3;
        }

        .card .meta b {
            color: #e8ecf1;
        }

        .card .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        /* ============================================================
           КНОПКИ
           ============================================================ */
        .btn {
            background: #1f2d42;
            border: none;
            color: #e8ecf1;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #2a3d57;
            transform: scale(1.02);
        }

        .btn-primary {
            background: #2a4d7a;
        }
        .btn-primary:hover {
            background: #3a5f8f;
        }

        .btn-success {
            background: #1e6b4c;
        }
        .btn-success:hover {
            background: #2a805d;
        }

        .btn-danger {
            background: #6b2a2a;
        }
        .btn-danger:hover {
            background: #8a3535;
        }

        .btn-gold {
            background: #7a6a2a;
        }
        .btn-gold:hover {
            background: #9a8a3a;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 11px;
        }

        /* ============================================================
           ДИАЛОГИ (Мухич)
           ============================================================ */
        .dialog-box {
            background: #0b121d;
            border-radius: 14px;
            padding: 16px 18px;
            border-left: 4px solid #5b9aff;
            margin-bottom: 10px;
        }

        .dialog-box .who {
            font-weight: 600;
            font-size: 14px;
            color: #5b9aff;
        }

        .dialog-box .text {
            font-size: 14px;
            margin-top: 4px;
            line-height: 1.5;
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 600px) {
            #game {
                padding: 14px 12px 20px;

            .header h1 {
                font-size: 18px;

                grid-template-columns: repeat(2, 1fr);
                gap: 4px;
                padding: 10px;
            }
            .hud-item .value {
                font-size: 18px;
            }
            .grid-2 {
                grid-template-columns: 1fr 1fr;
            }
            .tab-btn {
                font-size: 12px;
                padding: 5px 12px;
            }
        }

        @media (max-width: 400px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .hud {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* ============================================================
           СКРОЛЛ
           ============================================================ */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0b121d;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2d42;
            border-radius: 4px;
        }

            const solved = GameState.crimesSolved;

            return result;

            if (dialogs.length === 0) {
                container.innerHTML =
                    `<div class="dialog-box"><div class="who">📢 Пока нет диалогов</div><div class="text">Раскрывай дела, чтобы получать звонки</div></div>`;
                return;
            }
            container.innerHTML = dialogs.map(d => `
                        <div class="dialog-box">
                            <div class="who">${d.who}</div>
                            <div class="text">${d.text}</div>
                        </div>
                    `).join('');
        }

        // ----- РЕНДЕРИНГ СТАТИСТИКИ -----
        function renderStats() {
            const container = document.getElementById('statsContent');
            const total = CRIMES_DB.length;
            const solved = GameState.crimesSolved;
            const failed = GameState.crimesFailed;
            const bribe = GameState.bribeCount;
            const law = GameState.lawCount;
            const rate = total > 0 ? Math.round((solved / total) * 100) : 0;

            container.innerHTML = `
                        <div class="grid-2">
                            <div class="card">
                                <div class="title">📊 Общая статистика</div>
                                <div class="meta">
                                    <div>Всего дел: <b>${total}</b></div>
                                    <div>Раскрыто: <b>${solved}</b></div>
                                    <div>Провалено: <b>${failed}</b></div>
                                    <div>Раскрываемость: <b>${rate}%</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">⚖️ Методы работы</div>
                                <div class="meta">
                                    <div>По закону: <b>${law}</b></div>
                                    <div>Взятки: <b>${bribe}</b></div>
                                    <div>Соотношение: <b>${law > 0 ? Math.round((law/(law+bribe))*100) : 0}% / ${bribe > 0 ? Math.round((bribe/(law+bribe))*100) : 0}%</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">🏆 Карьера</div>
                                <div class="meta">
                                    <div>Ранг: <b>${getRank().title}</b></div>
                                    <div>Зарплата: <b>${formatMoney(getSalary())}</b></div>
                                    <div>Деньги: <b>${formatMoney(GameState.money)}</b></div>
                                    <div>День в ОМВД: <b>${GameState.day}</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">🚗 Автомобиль</div>
                                <div class="meta">
                                    <div>Модель: <b>${GameState.car}</b></div>
                                    <div>Состояние: <b>${GameState.carHealth}%</b></div>
                                    <div>Бензин: <b>${GameState.fuel}%</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">😰 Психологическое состояние</div>
                                <div class="meta">
                                    <div>Стресс: <b>${GameState.stress}%</b></div>
                                    <div>Репутация: <b>${GameState.reputation}%</b></div>
                                </div>
                            </div>
                        </div>
                    `;
        }

        // ============================================================
        //  7. ИГРОВЫЕ МЕХАНИКИ
        // ============================================================

        // ----- РЕШЕНИЕ ДЕЛА -----
        function solveCrime(id, method) {
            const crime = CRIMES_DB.find(c => c.id === id);
            if (!crime) return;

            // Проверка ресурсов
            if (GameState.fuel < 10) {
                alert('⛽ Нет бензина! Заправь машину в гараже.');
                return;
            }

            // Расход топлива
            GameState.fuel = clamp(GameState.fuel - rand(5, 15), 0, 100);

            // Износ машины
            GameState.carHealth = clamp(GameState.carHealth - rand(2, 8), 0, 100);

            // Успех зависит от сложности, стресса и репутации
            const stressMod = GameState.stress / 100;
            const repMod = GameState.reputation / 100;
            const baseChance = 100 - crime.risk;
            const successChance = clamp(baseChance + repMod * 15 - stressMod * 20, 10, 95);

            const success = Math.random() * 100 < successChance;

            if (success) {
                // Успех
                let reward = crime.reward;
                let reputationChange = 5;
                let stressChange = -5;

                if (method === 'bribe') {
                    // Взятка — больше денег, но риск
                    reward = Math.round(reward * 1.5);
                    reputationChange = -10;
                    stressChange = 10;
                    GameState.bribeCount++;
                    // Риск ССБ
                    if (Math.random() * 100 < 15) {
                        alert('🚨 Тебя поймали на взятке! ССБ начала расследование.');
                        GameState.reputation = clamp(GameState.reputation - 20, 0, 100);
                        GameState.money = Math.round(GameState.money * 0.7);
                    }
                } else {
                    // Закон
                    GameState.lawCount++;
                    reputationChange = 10;
                    stressChange = -10;
                }

                GameState.money += reward;
                GameState.reputation = clamp(GameState.reputation + reputationChange, 0, 100);
                GameState.stress = clamp(GameState.stress + stressChange, 0, 100);
                GameState.crimesSolved++;
                GameState.completedCrimes.push(id);

                // Диалог успеха
                addDialog('📢 Успех!', `Дело "${crime.title}" раскрыто! +${formatMoney(reward)}`);

                // Проверка повышения
                const newRank = getRank();
                if (newRank.level > GameState.rank) {
                    GameState.rank = newRank.level;
                    addDialog('🎉 Повышение!', `Поздравляю! Теперь ты ${newRank.title}!`);
                }

            } else {
                // Провал
                GameState.crimesFailed++;
                GameState.stress = clamp(GameState.stress + 15, 0, 100);
                GameState.reputation = clamp(GameState.reputation - 10, 0, 100);
                addDialog('❌ Провал', `Дело "${crime.title}" провалено! Потеряна репутация.`);
            }

            // Рандомный звонок Мухича
            if (Math.random() * 100 < 30) {
                const msg = pick(DIALOGS_DB.muhich);
                addDialog(msg.who, msg.text);
                GameState.stress = clamp(GameState.stress + rand(3, 8), 0, 100);
            }

            // Рандомный звонок Яковлева
            if (Math.random() * 100 < 20) {
                const msg = pick(DIALOGS_DB.yakovlev);
                addDialog(msg.who, msg.text);
            }

            GameState.day++;
            saveGame();
            renderAll();
        }

        // ----- ИГНОРИРОВАНИЕ ДЕЛА -----
        function skipCrime(id) {
            if (!confirm('Точно пропустишь дело? Это может отразиться на репутации.')) return;
            GameState.reputation = clamp(GameState.reputation - 3, 0, 100);
            GameState.completedCrimes.push(id);
            addDialog('📋 Пропуск', 'Ты проигнорировал дело. Репутация немного упала.');
            saveGame();
            renderAll();
        }

        // ----- ДОБАВЛЕНИЕ ДИАЛОГА -----
        function addDialog(who, text) {
            GameState.dialogs.push({ who, text, time: new Date().toLocaleTimeString() });
            if (GameState.dialogs.length > 100) {
                GameState.dialogs = GameState.dialogs.slice(-80);
            }
        }

        // ----- ВЫБОР АВТОМОБИЛЯ -----
        function selectCar(model) {
            GameState.car = model;
            addDialog('🚗 Гараж', `Ты пересел на ${model}`);
            saveGame();
            renderAll();
        }

        // ----- РЕМОНТ АВТО -----
        function repairCar(model) {
            if (GameState.money < 5000) {
                alert('Недостаточно денег! Нужно 5000 ₽');
                return;
            }
            GameState.money -= 5000;
            GameState.carHealth = clamp(GameState.carHealth + 20, 0, 100);
            addDialog('🔧 Ремонт', 'Машина отремонтирована. Здоровье +20%');
            saveGame();
            renderAll();
        }

        // ----- ЗАПРАВКА -----
        function refuel() {
            if (GameState.money < 2000) {
                alert('Недостаточно денег! Нужно 2000 ₽');
                return;
            }
            GameState.money -= 2000;
            GameState.fuel = clamp(GameState.fuel + 30, 0, 100);
            addDialog('⛽ Заправка', 'Бак заправлен. Бензин +30%');
            saveGame();
            renderAll();
        }

        // ----- СБРОС ИГРЫ -----
        function resetGame() {
            if (!confirm('⚠️ ВСЁ БУДЕТ УДАЛЕНО! Начать заново?')) return;
            localStorage.removeItem('barviha_rp_save');
            location.reload();
        }

        // ============================================================
        //  8. ГЛАВНЫЙ РЕНДЕРИНГ
        // ============================================================

        function renderAll() {
            updateHUD();
            renderCrimes();
            renderGarage();
            renderDialogs();
            renderStats();
        }

        // ============================================================
        //  9. ВКЛАДКИ
        // ============================================================

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // ============================================================
        //  10. ЗАПУСК
        // ============================================================

        // Загружаем сохранение
        const loaded = loadGame();

        // Добавляем стартовый диалог
        if (!loaded || GameState.dialogs.length === 0) {
            addDialog('🚔 ОМВД Барвиха-Северное', 'Добро пожаловать на службу! Раскрывай дела, повышай ранг, зарабатывай деньги.');
            addDialog('📞 Мухич', 'Привет! Это я, Мухич. Жду тебя в отделе, есть дело!');
            addDialog('👮 Яковлев', 'Новичок, да? Не подведи. Устав — это святое.');
            addDialog('🎯 Гриша', 'Брат, я в деле. Ты тоже в деле? Погнали!');
            saveGame();
        }

        // Проверяем, если нет денег — даём стартовый капитал
        if (GameState.money === 0 && GameState.crimesSolved === 0) {
            GameState.money = 5000;
        }

        // Запускаем рендеринг
        renderAll();

        // Автосохранение каждые 30 секунд
        setInterval(() => {
            saveGame();
            console.log('💾 Автосохранение...');
        }, 30000);

        console.log('🚔 ОМВД Барвиха-Северное загружен!');
        console.log(`👮 Персонажей: ${CRIMES_DB.length} дел, ${DIALOGS_DB.muhich.length + DIALOGS_DB.yakovlev.length + DIALOGS_DB.grisha.length} диалогов, ${GARAGE_DB.length} машин`);
        console.log('💾 Сохранения в localStorage');
        console.log('🎮 Играй!');
    </script>
</body>
</html>
