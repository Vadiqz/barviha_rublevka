<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ОМВД Барвиха-Северное | CRM-портал</title>
    <style>
        /* ============================================================
           ГЛОБАЛЬНЫЙ СТИЛЬ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080b10;
            --bg-card: #0e141c;
            --border: #1c2533;
            --border-light: #2a3a4a;
            --blue: #0071e3;
            --blue-hover: #005bb5;
            --gold: #c9a84c;
            --red: #e74c3c;
            --green: #2ecc71;
            --text: #eaeef3;
            --text-secondary: #8896a8;
            --text-muted: #5d6a7a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            --radius: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding-bottom: 60px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============================================================
           КНОПКИ И УТИЛИТЫ
           ============================================================ */
        .btn {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            background: var(--blue-hover);
            transform: scale(1.02);
        }

        .btn-danger {
            background: var(--red);
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: var(--green);
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--blue);
            background: rgba(0, 113, 227, 0.1);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin: 40px 0 20px;
            padding-left: 16px;
            border-left: 4px solid var(--blue);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .section-title .count {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 3px 12px;
            border-radius: 4px;
            display: inline-block;
        }

        .tag-blue {
            background: rgba(0, 113, 227, 0.15);
            color: var(--blue);
        }
        .tag-red {
            background: rgba(231, 76, 60, 0.15);
            color: var(--red);
        }
        .tag-gold {
            background: rgba(201, 168, 76, 0.15);
            color: var(--gold);
        }
        .tag-green {
            background: rgba(46, 204, 113, 0.15);
            color: var(--green);
        }

        /* ============================================================
           ШАПКА
           ============================================================ */
        .hero {
            background: linear-gradient(145deg, #0a0f17, #141c28);
            padding: 30px 20px 20px;
            border-bottom: 2px solid var(--border);
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 900;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        /* ============================================================
           КАРТОЧКИ
           ============================================================ */
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--border-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 16px 18px 18px;
        }

        .card-body h3 {
            font-size: 17px;
            margin: 4px 0 2px;
        }

        .card-body .sub {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .card-body .meta-row {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .card-body .meta-row strong {
            color: var(--text);
        }

        /* ============================================================
           АРХИВ ДЕЛ
           ============================================================ */
        .case-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .case-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 4px solid var(--border);
        }

        .case-item:hover {
            border-left-color: var(--blue);
            background: rgba(14, 20, 28, 0.6);
        }

        .case-item .header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

        .case-item .number {
            font-weight: 700;
            font-size: 15px;
        }

        .case-item .status {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 12px;
            border-radius: 20px;
        }

        .case-item .status.solved {
            background: rgba(46, 204, 113, 0.15);
            color: var(--green);
        }

        .case-item .status.active {
            background: rgba(201, 168, 76, 0.15);
            color: var(--gold);
        }

        .case-item .status.closed {
            background: rgba(231, 76, 60, 0.15);
            color: var(--red);
        }

        .case-item .title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 2px;
        }

        .case-item .preview {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ============================================================
           СТАТИСТИКА
           ============================================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 14px;
            margin: 10px 0 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 12px;
            text-align: center;
        }

        .stat-card .num {
            font-size: 30px;
            font-weight: 900;
            color: var(--blue);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ============================================================
           ФОРМЫ
           ============================================================ */
        .form-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-modal.active {
            display: flex;
        }

        .form-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            max-width: 480px;
            width: 100%;
            border-radius: var(--radius);
            padding: 28px 26px;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-box .close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            color: var(--text-secondary);
            cursor: pointer;
            background: none;
            border: none;
        }

        .form-box h2 {
            font-size: 22px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--blue);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        /* ============================================================
           ДЕТАЛЬНАЯ МОДАЛКА (просмотр)
           ============================================================ */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .detail-modal.active {
            display: flex;
        }

        .detail-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: var(--radius);
            padding: 28px 26px;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        .detail-box .close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            color: var(--text-secondary);
            cursor: pointer;
            background: none;
            border: none;
        }

        .detail-box h2 {
            font-size: 22px;
            margin-bottom: 6px;
            padding-right: 30px;
        }

        .detail-box .subhead {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .detail-box hr {
            border: 0;
            height: 1px;
            background: var(--border);
            margin: 14px 0;
        }

        .detail-box .content {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .detail-box .content b {
            color: var(--text);
        }

        .detail-box .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 600px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 22px;
            }

            .section-title {
                font-size: 19px;
            }

            .form-box {
                padding: 20px 16px;
            }

            .detail-box {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    ШАПКА
    ============================================================ -->
    <header class="hero">
        <div class="container">
            <h1>ОМВД «Барвиха-Северное»</h1>
            <p>Цифровая база данных отдела</p>
            <div class="hero-actions">
                <button class="btn" onclick="openAddStaff()">➕ Добавить сотрудника</button>
                <button class="btn btn-success" onclick="openAddCase()">📋 Добавить дело</button>
                <button class="btn btn-outline" onclick="exportData()">📤 Экспорт данных</button>
                <button class="btn btn-outline" onclick="importData()">📥 Импорт</button>
            </div>
        </div>
    </header>

    <!-- ============================================================
    ОСНОВНОЙ КОНТЕНТ
    ============================================================ -->
    <main class="container">

        <!-- ==================== СТАТИСТИКА ==================== -->
        <section id="stats">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="num" id="totalStaff">0</div><div class="label">Сотрудников</div></div>
                <div class="stat-card"><div class="num" id="totalCases">0</div><div class="label">Всего дел</div></div>
                <div class="stat-card"><div class="num" id="solvedCases">0</div><div class="label">Раскрыто</div></div>
                <div class="stat-card"><div class="num" id="clearanceRate">0%</div><div class="label">Раскрываемость</div></div>
            </div>
        </section>

        <!-- ==================== СОТРУДНИКИ ==================== -->
        <section id="staff">
            <h2 class="section-title">Личный состав <span class="count" id="staffCount">0</span></h2>
            <div class="grid-2col" id="staffGrid">
                <!-- Заполняется из JS -->
            </div>
        </section>

        <!-- ==================== АРХИВ ДЕЛ ==================== -->
        <section id="cases">
            <h2 class="section-title">Архив уголовных дел <span class="count" id="casesCount">0</span></h2>
            <div class="case-list" id="caseList">
                <!-- Заполняется из JS -->
            </div>
        </section>

    </main>

    <!-- ============================================================
    ФОРМА ДОБАВЛЕНИЯ СОТРУДНИКА
    ============================================================ -->
    <div class="form-modal" id="staffForm">
        <div class="form-box">
            <button class="close" onclick="closeForm('staffForm')">&times;</button>
            <h2 id="staffFormTitle">Добавить сотрудника</h2>
            <input type="hidden" id="editStaffId">
            <div class="form-group">
                <label>ФИО</label>
                <input type="text" id="staffName" placeholder="Иванов И.И.">
            </div>
            <div class="form-group">
                <label>Звание</label>
                <input type="text" id="staffRank" placeholder="Капитан полиции">
            </div>
            <div class="form-group">
                <label>Должность</label>
                <input type="text" id="staffPosition" placeholder="Старший оперуполномоченный">
            </div>
            <div class="form-group">
                <label>Стаж (лет)</label>
                <input type="number" id="staffExperience" placeholder="10">
            </div>
            <div class="form-group">
                <label>Раскрыто дел</label>
                <input type="number" id="staffSolved" placeholder="25">
            </div>
            <div class="form-actions">
                <button class="btn" onclick="saveStaff()">Сохранить</button>
                <button class="btn btn-outline" onclick="closeForm('staffForm')">Отмена</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    ФОРМА ДОБАВЛЕНИЯ ДЕЛА
    ============================================================ -->
    <div class="form-modal" id="caseForm">
        <div class="form-box">
            <button class="close" onclick="closeForm('caseForm')">&times;</button>
            <h2 id="caseFormTitle">Добавить дело</h2>
            <input type="hidden" id="editCaseId">
            <div class="form-group">
                <label>Номер дела</label>
                <input type="text" id="caseNumber" placeholder="УД-2026-1024">
            </div>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="caseTitle" placeholder="Кража в Жуковке">
            </div>
            <div class="form-group">
                <label>Статья УК</label>
                <input type="text" id="caseArticle" placeholder="ст. 158 УК РФ">
            </div>
            <div class="form-group">
                <label>Краткое описание</label>
                <textarea id="caseDesc" rows="3" placeholder="Описание дела..."></textarea>
            </div>
            <div class="form-group">
                <label>Статус</label>
                <select id="caseStatus">
                    <option value="active">🔄 В работе</option>
                    <option value="solved">✅ Раскрыто</option>
                    <option value="closed">❌ Закрыто</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn" onclick="saveCase()">Сохранить</button>
                <button class="btn btn-outline" onclick="closeForm('caseForm')">Отмена</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    ДЕТАЛЬНАЯ МОДАЛКА (просмотр)
    ============================================================ -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-box">
            <button class="close" onclick="closeDetail()">&times;</button>
            <h2 id="detailTitle"></h2>
            <div class="subhead" id="detailSubhead"></div>
            <hr>
            <div class="content" id="detailContent"></div>
            <div class="actions" id="detailActions">
                <!-- Кнопки редактирования/удаления будут тут -->
            </div>
        </div>
    </div>

    <!-- ============================================================
    СКРИПТ — ПОЛНОЦЕННАЯ БАЗА ДАННЫХ (localStorage)
    ============================================================ -->
    <script>
        // ============================================================
        // БАЗА ДАННЫХ
        // ============================================================
        const DB = {
            getStaff() {
                return JSON.parse(localStorage.getItem('omvd_staff')) || [];
            },
            setStaff(data) {
                localStorage.setItem('omvd_staff', JSON.stringify(data));
            },
            getCases() {
                return JSON.parse(localStorage.getItem('omvd_cases')) || [];
            },
            setCases(data) {
                localStorage.setItem('omvd_cases', JSON.stringify(data));
            }
        };

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ (если база пуста — заполняем демо-данными)
        // ============================================================
        function initDB() {
            let staff = DB.getStaff();
            let cases = DB.getCases();

            if (staff.length === 0) {
                staff = [
                    { id: 1, name: 'Измайлов Г. А.', rank: 'Капитан полиции', position: 'Старший оперуполномоченный ОУР', experience: 14, solved: 47 },
                    { id: 2, name: 'Яковлев В. С.', rank: 'Полковник полиции', position: 'Начальник ОМВД', experience: 23, solved: 30 },
                    { id: 3, name: 'Соколова Е. В.', rank: 'Майор полиции', position: 'Начальник следственного отделения', experience: 12, solved: 31 },
                    { id: 4, name: 'Козлов Д. И.', rank: 'Старший лейтенант', position: 'Инспектор ДПС', experience: 6, solved: 20 }
                ];
                DB.setStaff(staff);
            }

            if (cases.length === 0) {
                cases = [
                    { id: 1, number: 'УД-2025-017', title: 'Дело «Барвихинский стрелок»', article: 'ст. 105 УК РФ',
                        desc: 'Убийство в коттеджном посёлке. Раскрыто за 48 часов.', status: 'solved' },
                    { id: 2, number: 'УД-2026-1024', title: 'Кража часов в Жуковке', article: 'ст. 158 УК РФ',
                        desc: 'Похищена коллекция часов на 15 млн руб.', status: 'active' },
                    { id: 3, number: 'УД-2026-1025', title: 'Угон Porsche в Luxury Village', article: 'ст. 166 УК РФ',
                        desc: 'Угнан спорткар. Найден за сутки.', status: 'solved' },
                    { id: 4, number: 'УД-2024-891', title: 'Мошенничество в Рублёвке', article: 'ст. 159 УК РФ',
                        desc: 'Хищение 50 млн руб. у инвесторов.', status: 'closed' }
                ];
                DB.setCases(cases);
            }

            renderAll();
        }

        // ============================================================
        // ГЕНЕРАТОР ID
        // ============================================================
        function generateId() {
            return Date.now() + Math.floor(Math.random() * 1000);
        }

        // ============================================================
        // РЕНДЕРИНГ
        // ============================================================
        function renderAll() {
            renderStaff();
            renderCases();
            renderStats();
        }

        function renderStaff() {
            const staff = DB.getStaff();
            const grid = document.getElementById('staffGrid');
            const count = document.getElementById('staffCount');

            count.textContent = staff.length;

            if (staff.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-secondary); border:2px dashed var(--border); border-radius:var(--radius);">
                        Нет сотрудников. Добавьте первого!
                    </div>
                `;
                return;
            }

            grid.innerHTML = staff.map(s => `
                <div class="card" onclick="viewStaff(${s.id})">
                    <img class="card-img" src="https://picsum.photos/seed/staff_${s.id}/400/300" alt="${s.name}">
                    <div class="card-body">
                        <div>
                            <span class="tag tag-blue">${s.position.includes('Начальник') ? 'Руководство' : 'Сотрудник'}</span>
                        </div>
                        <h3>${s.name}</h3>
                        <div class="sub">${s.rank}</div>
                        <div class="meta-row">
                            <span>📌 <strong>${s.solved}</strong> дел</span>
                            <span>⭐ <strong>${s.experience}</strong> лет стажа</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderCases() {
            const cases = DB.getCases();
            const list = document.getElementById('caseList');
            const count = document.getElementById('casesCount');

            count.textContent = cases.length;

            if (cases.length === 0) {
                list.innerHTML = `
                    <div style="text-align:center; padding:40px; color:var(--text-secondary); border:2px dashed var(--border); border-radius:var(--radius);">
                        Нет дел. Добавьте первое!
                    </div>
                `;
                return;
            }

            const statusMap = {
                solved: { label: '✅ Раскрыто', class: 'solved' },
                active: { label: '🔄 В работе', class: 'active' },
                closed: { label: '❌ Закрыто', class: 'closed' }
            };

            list.innerHTML = cases.map(c => {
                const st = statusMap[c.status] || statusMap.active;
                return `
                    <div class="case-item" onclick="viewCase(${c.id})">
                        <div class="header">
                            <span class="number">${c.number}</span>
                            <span class="status ${st.class}">${st.label}</span>
                        </div>
                        <div class="title">${c.title}</div>
                        <div style="font-size:13px; color:var(--text-secondary);">${c.article}</div>
                        <div class="preview">${c.desc}</div>
                    </div>
                `;
            }).join('');
        }

        function renderStats() {
            const staff = DB.getStaff();
            const cases = DB.getCases();

            document.getElementById('totalStaff').textContent = staff.length;
            document.getElementById('totalCases').textContent = cases.length;

            const solved = cases.filter(c => c.status === 'solved' || c.status === 'closed').length;
            document.getElementById('solvedCases').textContent = solved;

            const rate = cases.length > 0 ? Math.round((solved / cases.length) * 100) : 0;
            document.getElementById('clearanceRate').textContent = rate + '%';
        }

        function editStaff(id) {

            if (!s) return;

            document.getElementById('staffFormTitle').textContent = 'Редактировать сотрудника';
            document.getElementById('editStaffId').value = id;
            document.getElementById('staffName').value = s.name;

        }

        function saveStaff() {
            const id = document.getElementById('editStaffId').value;
            const name = document.getElementById('staffName').value.trim();
            const rank = document.getElementById('staffRank').value.trim();
            const position = document.getElementById('staffPosition').value.trim();
            const experience = parseInt(document.getElementById('staffExperience').value) || 0;
            const solved = parseInt(document.getElementById('staffSolved').value) || 0;

            if (!name) { alert('Введите ФИО'); return; }

            let staff = DB.getStaff();

            if (id) {
                // Редактирование
                const idx = staff.findIndex(s => s.id === parseInt(id));
                if (idx !== -1) {
                    staff[idx] = { ...staff[idx], name, rank, position, experience, solved };
                }
            } else {
                // Добавление
                staff.push({ id: generateId(), name, rank, position, experience, solved });
            }

            DB.setStaff(staff);
            closeForm('staffForm');
            renderAll();
        }
