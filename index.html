<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ОМВД | Барвиха RP</title>
    <style>
        body { margin: 0; background: #080808; color: #fff; font-family: -apple-system, sans-serif; }
        .hud { padding: 20px; background: #1a1a1a; border-bottom: 2px solid #b91c1c; display: flex; justify-content: space-between; font-weight: bold; }
        .menu { padding: 20px; }
        button { width: 100%; padding: 15px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; }
        button:active { background: #b91c1c; }
    </style>
</head>
<body>

<div class="hud">
    <div id="display-money">₽: 0</div>
    <div id="display-rank">Лейтенант</div>
</div>

<div class="menu">
    <button onclick="Game.earn(10000)">Выписать штраф (+10к)</button>
    <button onclick="Game.takeBribe(50000)">Взять взятку (+50к)</button>
    <button onclick="Game.reset()">Сбросить прогресс</button>
</div>

<script>
/**
 * OMVDBARVIHA RP ENGINE V1.0
 * База с сохранением прогресса
 */

const Game = {
    // Начальные данные
    data: {
        money: 50000,
        rank: "Лейтенант"
    },

    // Загрузка при старте
    init() {
        const saved = localStorage.getItem('omvd_save');
        if (saved) {
            this.data = JSON.parse(saved);
        }
        this.updateUI();
    },

    // Сохранение
    save() {
        localStorage.setItem('omvd_save', JSON.stringify(this.data));
        this.updateUI();
    },

    // Функции заработка
    earn(amount) {
        this.data.money += amount;
        this.save();
        alert("Отчет сдан. Премия: " + amount);
    },

    takeBribe(amount) {
        this.data.money += amount;
        this.save();
        alert("Взятка принята. Яковлев не узнает.");
    },

    reset() {
        localStorage.removeItem('omvd_save');
        location.reload();
    },

    updateUI() {
        document.getElementById('display-money').innerText = `₽: ${this.data.money.toLocaleString()}`;
    }
};

// Запускаем движок
Game.init();
</script>
</body>
</html>
