            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header .meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header .meta .badge {
            background: #1a2636;
            color: #7aa9ff;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(122, 169, 255, 0.12);
        }

        .header .meta .btn-outline {
            background: none;
            border: 1px solid #2a3d57;
            color: #8896b0;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .header .meta .btn-outline:hover {
            background: #1a2636;
            color: #eef2f6;
            border-color: #5b9aff;
        }

        /* ===== HUD ===== */
        .hud {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: #0b121d;
            border-radius: 18px;
            padding: 14px 16px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .hud-item {
            text-align: center;
        }

        .hud-item .value {
            font-size: 20px;
            font-weight: 700;
            color: #5b9aff;
            line-height: 1.2;
            transition: 0.2s;
        }

        .hud-item .label {
            font-size: 10px;
            text-transform: uppercase;
            color: #6a7a93;
            letter-spacing: 0.5px;
        }

        .hud-item .value.danger {
            color: #f06a6a;
        }
        .hud-item .value.warning {
            color: #f0b34b;
        }
        .hud-item .value.success {
            color: #4caf84;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            background: #0b121d;
            border-radius: 16px;
            padding: 4px;
        }

        .tabs button {
            background: none;
            border: none;
            color: #7a8aa3;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 80px;
        }

        .tabs button:hover {
            color: #eef2f6;
            background: #1a2636;
        }

        .tabs button.active {
            color: #fff;
            background: #1f2d42;
            box-shadow: inset 0 0 0 1px rgba(91, 154, 255, 0.15);
        }

        /* ===== КОНТЕНТ ===== */
        .tab-content {
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .grid-1 {
            display: flex;

            gap: 10px;
        }

            padding: 16px 18px 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);

            border-color: rgba(91, 154, 255, 0.08);
        }

            font-weight: 600;
        }

            color: #7a8aa3;
            margin-top: 2px;
        }

        .card .desc {
            font-size: 13px;
            color: #a0b0c8;
            margin: 4px 0 8px;
        }

        .card .meta {

            flex-wrap: wrap;

            font-size: 12px;
            color: #7a8aa3;
            margin-top: 6px;

        }

            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn {
            background: #1f2d42;
            border: none;
            color: #eef2f6;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 18px;

        }

        .btn:hover {
            background: #2a3d57;

        }

        .btn-primary {
            background: #2a4d7a;
        }

            background: #3a5f8f;
        }

        .btn-success {
            background: #1e6b4c;

            background: #2a805d;
        }

        }

        }

        }

            'Твои методы не всегда этичны, но они работают.',
            'Ты слишком много берёшь на себя. Делегируй.',
            'Я получил жалобу на тебя. Разберись.',
            'Ты — лучший сыщик в моём отделе. Не подведи.',
            'Я перевожу тебя в отдел по особо важным делам.',
            'Ты слишком эмоционален. Держи себя в руках.',
            'Отличный результат по итогам месяца. Ты заслужил премию.'
        ];

        const GRISHA = [
            'Брат, я в деле. Ты тоже в деле? Погнали!',
            'Это просто бизнес, ничего личного.',
            'Слушай, я ценю твой подход к работе. Ты как я.',
            'Помнишь дело на Рублёвке? Мы круто их развели!',
            'Ты знаешь, что такое настоящая свобода? Деньги и пофиг.',
            'У меня есть предложение. Бизнес, деньги, риск. Ты за?',
            'Я не верю в систему. Но я верю в тебя.',
            'Давай замутим одно дельце. Чисто, без свидетелей.',
            'Брат, ты слишком осторожен. Надо прыгать в омут.',
            'Эта работа нас съест, если не получать кайф. Я получаю.',
            'Слышал, ты опять поцапался с Яковлевым. Я на твоей стороне.',
            'Деньги любят смелых. Ты смелый?'
        ];

        // ----- ГАРАЖ -----
        const CARS = [
            { model: 'Porsche 911 Turbo S', price: 22000000, desc: 'V8 битурбо, 650 л.с. 2.6 сек до 100' },
            { model: 'Mercedes-Benz S-Class', price: 15000000, desc: 'V8 битурбо. Символ статуса' },
            { model: 'Lamborghini Urus', price: 25000000, desc: 'V8 битурбо, 650 л.с. Спортивный внедорожник' },
            { model: 'BMW X5 M', price: 12000000, desc: 'V8, 600 л.с. Для бизнес-поездок' },
            { model: 'Audi A4', price: 5000000, desc: 'Турбодизель. Надёжный и комфортный' },
            { model: 'Ford Focus II', price: 2500000, desc: 'Служебная машина. Простая и надёжная' },
            { model: 'УАЗ Патриот', price: 1500000, desc: 'Служебный внедорожник. Проходимый' },
            { model: 'Chrysler PT Cruiser', price: 800000, desc: 'Ретро-хэтчбек. Для Мухича' },
            { model: 'Porsche Cayenne', price: 18000000, desc: 'V6, 340 л.с. Люксовый кроссовер' },
            { model: 'BMW 4-Series', price: 8000000, desc: 'V6, 350 л.с. Спортивное купе' },
            { model: 'Кастомный чоппер', price: 3000000, desc: 'Чёрный мощный байк' },
            { model: 'Skoda Octavia', price: 3500000, desc: 'Серая, скромная, надёжная' },
            { model: 'Toyota Camry', price: 4500000, desc: 'Белый седан. Для начальства' },
            { model: 'Nissan Teana', price: 4000000, desc: 'Бордовый → черный. Для Яковлева' },
            { model: 'Hyundai Solaris', price: 1500000, desc: 'Надёжный седан для Гудковой' },
            { model: 'Mercedes E-Class (W212)', price: 10000000, desc: 'Чёрный седан Измайлова' },
            { model: 'Hyundai Getz', price: 800000, desc: 'Красный хэтчбек для дрифта' },
            { model: 'BMW 5-Series', price: 9000000, desc: 'Патрульный с ливреей и мигалками' },
            { model: 'Lada Vesta', price: 1200000, desc: 'Вечно ломается, но своя' },
            { model: 'ВАЗ-2109', price: 200000, desc: 'Для скрытого наблюдения. Неприметная' }
        ];

        // ----- РАНГИ -----
        const RANKS = [
            { level: 0, title: 'Стажёр', salary: 30000, need: 0 },
            { level: 1, title: 'Мл. лейтенант', salary: 50000, need: 3 },
            { level: 2, title: 'Лейтенант', salary: 70000, need: 8 },
            { level: 3, title: 'Ст. лейтенант', salary: 90000, need: 15 },
            { level: 4, title: 'Капитан', salary: 110000, need: 25 },
            { level: 5, title: 'Майор', salary: 140000, need: 40 },
            { level: 6, title: 'Подполковник', salary: 170000, need: 60 },
            { level: 7, title: 'Полковник', salary: 200000, need: 80 },
            { level: 8, title: 'Генерал-майор', salary: 250000, need: 100 },
            { level: 9, title: 'Начальник ОМВД', salary: 350000, need: 150 }
        ];

        // ================================================================
        // 2.  СОСТОЯНИЕ ИГРЫ
        // ================================================================

        const state = {
            money: 5000,
            rank: 0,
            stress: 0,
            reputation: 50,
            carHealth: 100,
            fuel: 100,
            day: 1,
            crimesSolved: 0,
            crimesFailed: 0,
            bribeCount: 0,
            lawCount: 0,
            car: 'Porsche 911 Turbo S',
            completed: [],
            dialogs: []
        };

        // ================================================================
        // 3.  СОХРАНЕНИЕ
        // ================================================================

        function save() {
            try {
                localStorage.setItem('barviha_rp', JSON.stringify(state));
            } catch (e) {}
        }

        function load() {
            try {
                const raw = localStorage.getItem('barviha_rp');
                if (!raw) return false;
                const data = JSON.parse(raw);
                Object.assign(state, data);
                return true;
            } catch (e) { return false; }
        }

        // ================================================================
        // 4.  УТИЛИТЫ
        // ================================================================

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function pick(arr) { return arr[rand(0, arr.length - 1)]; }

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function fmt(n) { return n.toLocaleString('ru-RU') + ' ₽'; }

        function getRank() {
            let result = RANKS[0];
            for (const r of RANKS) {
                if (state.crimesSolved >= r.need) result = r;
            }
            return result;
        }

        // ================================================================
        // 5.  ДИАЛОГИ
        // ================================================================

        function addDialog(who, text) {
            state.dialogs.push({ who, text, time: new Date().toLocaleTimeString() });
            if (state.dialogs.length > 80) state.dialogs.shift();
        }

        function randomDialog() {
            const r = rand(1, 100);
            if (r < 40) {
                const msg = pick(MUHICH);
                addDialog('📞 Мухич', msg);
                state.stress = clamp(state.stress + rand(2, 6), 0, 100);
            } else if (r < 70) {
                const msg = pick(YAKOVLEV);
                addDialog('👮 Яковлев', msg);
            } else if (r < 90) {
                const msg = pick(GRISHA);
                addDialog('🎯 Гриша', msg);
            } else {
                addDialog('📢 ОМВД', 'Ничего особенного. Скучный день в Барвихе.');
            }
        }

        // ================================================================
        // 6.  ИГРОВЫЕ МЕХАНИКИ
        // ================================================================

        function solveCrime(id, method) {
            const crime = CRIMES.find(c => c.id === id);
            if (!crime) return;

            if (state.fuel < 5) {
                alert('⛽ Нет бензина! Заправь машину в гараже.');
                return;
            }

            // Расход ресурсов
            state.fuel = clamp(state.fuel - rand(5, 15), 0, 100);
            state.carHealth = clamp(state.carHealth - rand(2, 8), 0, 100);

            // Шанс успеха
            const base = 100 - crime.risk;
            const mod = state.reputation / 100 * 15 - state.stress / 100 * 20;
            const chance = clamp(base + mod, 15, 95);

            const success = Math.random() * 100 < chance;

            if (success) {
                let reward = crime.reward;
                let repDelta = 5;
                let stressDelta = -5;

                if (method === 'bribe') {
                    reward = Math.round(reward * 1.6);
                    repDelta = -12;
                    stressDelta = 10;
                    state.bribeCount++;
                    if (Math.random() * 100 < 12) {
                        alert('🚨 Тебя поймали на взятке! ССБ начала расследование.');
                        state.reputation = clamp(state.reputation - 25, 0, 100);
                        state.money = Math.round(state.money * 0.7);
                    }
                } else {
                    state.lawCount++;
                    repDelta = 12;
                    stressDelta = -12;
                }

                state.money += reward;
                state.reputation = clamp(state.reputation + repDelta, 0, 100);
                state.stress = clamp(state.stress + stressDelta, 0, 100);
                state.crimesSolved++;
                state.completed.push(id);

                addDialog('✅ Успех!', `Дело "${crime.title}" раскрыто! +${fmt(reward)}`);

                const newRank = getRank();
                if (newRank.level > state.rank) {
                    state.rank = newRank.level;
                    addDialog('🎉 Повышение!', `Поздравляю! Ты теперь ${newRank.title}!`);
                }
            } else {
                state.crimesFailed++;
                state.stress = clamp(state.stress + 18, 0, 100);
                state.reputation = clamp(state.reputation - 12, 0, 100);
                addDialog('❌ Провал', `Дело "${crime.title}" провалено! Репутация упала.`);
            }

            state.day++;
            randomDialog();
            save();
            renderAll();
        }

        function skipCrime(id) {
            if (!confirm('Пропустить дело? Репутация упадёт.')) return;
            state.reputation = clamp(state.reputation - 5, 0, 100);
            state.completed.push(id);
            addDialog('📋 Пропуск', 'Ты проигнорировал дело. Репутация упала.');
            save();
            renderAll();
        }

        function selectCar(model) {
            state.car = model;
            addDialog('🚗 Гараж', `Ты пересел на ${model}`);
            save();
            renderAll();
        }

        function repairCar() {
            if (state.money < 5000) { alert('Нужно 5000 ₽!'); return; }
            state.money -= 5000;
            state.carHealth = clamp(state.carHealth + 25, 0, 100);
            addDialog('🔧 Ремонт', 'Машина отремонтирована. Здоровье +25%');
            save();
            renderAll();
        }

        function refuelCar() {
            if (state.money < 2000) { alert('Нужно 2000 ₽!'); return; }
            state.money -= 2000;
            state.fuel = clamp(state.fuel + 30, 0, 100);
            addDialog('⛽ Заправка', 'Бак заправлен. Бензин +30%');
            save();
            renderAll();
        }

        function resetGame() {
            if (!confirm('⚠️ ВСЁ БУДЕТ УДАЛЕНО! Начать заново?')) return;
            localStorage.removeItem('barviha_rp');
            location.reload();
        }

        // ================================================================
        // 7.  РЕНДЕРИНГ
        // ================================================================

        function renderHUD() {
            document.getElementById('hudMoney').textContent = fmt(state.money);
            document.getElementById('hudRank').textContent = getRank().title;
            document.getElementById('hudStress').textContent = state.stress + '%';
            document.getElementById('hudRep').textContent = state.reputation + '%';
            document.getElementById('hudCar').textContent = state.carHealth + '%';
            document.getElementById('hudFuel').textContent = state.fuel + '%';

            // Цвета
            const s = document.getElementById('hudStress');
            s.className = 'value' + (state.stress > 70 ? ' danger' : state.stress > 40 ? ' warning' : '');

            const r = document.getElementById('hudRep');
            r.className = 'value' + (state.reputation > 70 ? ' success' : state.reputation > 40 ? '' : ' danger');

            const c = document.getElementById('hudCar');
            c.className = 'value' + (state.carHealth > 70 ? ' success' : state.carHealth > 40 ? ' warning' : ' danger');

            const f = document.getElementById('hudFuel');
            f.className = 'value' + (state.fuel > 30 ? ' success' : ' danger');
        }

        function renderCrimes() {
            const container = document.getElementById('crimesContainer');
            const available = CRIMES.filter(c => !state.completed.includes(c.id)).slice(0, 20);

            if (available.length === 0) {
                container.innerHTML =
                    `<div class="card"><div class="title">🎉 ВСЕ ДЕЛА РАСКРЫТЫ!</div><div class="sub">Ты — легенда Барвихи! Можешь уходить на пенсию.</div></div>`;
                return;
            }

            container.innerHTML = available.map(c => `
                        <div class="card">
                            <div class="title">${c.title}</div>
                            <div class="sub">${c.article} • ${c.type}</div>
                            <div class="desc">Сложность: ${'⭐'.repeat(c.diff)}</div>
                            <div class="meta">
                                <span>💰 ${fmt(c.reward)}</span>
                                <span>⚠️ Риск: ${c.risk}%</span>
                            </div>
                            <div class="actions">
                                <button class="btn btn-success btn-sm" onclick="solveCrime(${c.id}, 'law')">⚖️ Закон</button>
                                <button class="btn btn-gold btn-sm" onclick="solveCrime(${c.id}, 'bribe')">💵 Взятка</button>
                                <button class="btn btn-danger btn-sm" onclick="skipCrime(${c.id})">❌ Игнор</button>
                            </div>
                        </div>
                    `).join('');
        }

        function renderGarage() {
            const container = document.getElementById('garageContainer');
            container.innerHTML = `
                        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;">
                            <button class="btn btn-primary" onclick="repairCar()">🔧 Ремонт (5000₽)</button>
                            <button class="btn btn-primary" onclick="refuelCar()">⛽ Заправить (2000₽)</button>
                        </div>
                        <div class="grid-2">
                            ${CARS.map(c => `
                                <div class="card">
                                    <div class="title">${c.model}</div>
                                    <div class="sub">${c.desc}</div>
                                    <div class="meta">
                                        <span>💰 ${fmt(c.price)}</span>
                                        ${state.car === c.model ? '<span><b>✅ Текущее авто</b></span>' : ''}
                                    </div>
                                    <div class="actions">
                                        <button class="btn btn-primary btn-sm" onclick="selectCar('${c.model}')">🚗 Выбрать</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
        }

        function renderDialogs() {
            const container = document.getElementById('dialogsContainer');
            const dialogs = state.dialogs.slice(-15).reverse();

            if (dialogs.length === 0) {
                container.innerHTML =
                    `<div class="dialog-box"><div class="who">📢 Нет диалогов</div><div class="text">Раскрывай дела, чтобы получать звонки</div></div>`;
                return;
            }

            container.innerHTML = dialogs.map(d => `
                        <div class="dialog-box">
                            <div class="who">${d.who}</div>
                            <div class="text">${d.text}</div>
                            <div class="time">${d.time || ''}</div>
                        </div>
                    `).join('');
        }

        function renderStats() {
            const container = document.getElementById('statsContainer');
            const total = CRIMES.length;
            const solved = state.crimesSolved;
            const failed = state.crimesFailed;
            const rate = total > 0 ? Math.round((solved / total) * 100) : 0;
            const law = state.lawCount;
            const bribe = state.bribeCount;
            const ratio = law + bribe > 0 ? Math.round((law / (law + bribe)) * 100) : 0;

            container.innerHTML = `
                        <div class="grid-2">
                            <div class="card">
                                <div class="title">📊 Общая статистика</div>
                                <div class="meta">
                                    <div>Всего дел: <b>${total}</b></div>
                                    <div>Раскрыто: <b>${solved}</b></div>
                                    <div>Провалено: <b>${failed}</b></div>
                                    <div>Раскрываемость: <b>${rate}%</b></div>
                                    <div>Дней в ОМВД: <b>${state.day}</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">⚖️ Методы работы</div>
                                <div class="meta">
                                    <div>По закону: <b>${law}</b></div>
                                    <div>Взятки: <b>${bribe}</b></div>
                                    <div>Законность: <b>${ratio}%</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">🏆 Карьера</div>
                                <div class="meta">
                                    <div>Ранг: <b>${getRank().title}</b></div>
                                    <div>Зарплата: <b>${fmt(getRank().salary)}</b></div>
                                    <div>Деньги: <b>${fmt(state.money)}</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">🚗 Автомобиль</div>
                                <div class="meta">
                                    <div>Модель: <b>${state.car}</b></div>
                                    <div>Состояние: <b>${state.carHealth}%</b></div>
                                    <div>Бензин: <b>${state.fuel}%</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">😰 Психология</div>
                                <div class="meta">
                                    <div>Стресс: <b>${state.stress}%</b></div>
                                    <div>Репутация: <b>${state.reputation}%</b></div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="title">📜 Диалоги</div>
                                <div class="meta">
                                    <div>Всего: <b>${state.dialogs.length}</b></div>
                                    <div>Мухич: <b>${state.dialogs.filter(d => d.who.includes('Мухич')).length}</b></div>
                                    <div>Яковлев: <b>${state.dialogs.filter(d => d.who.includes('Яковлев')).length}</b></div>
                                </div>
                            </div>
                        </div>
                    `;
        }

        function renderAll() {
            renderHUD();
            renderCrimes();
            renderGarage();
            renderDialogs();
            renderStats();
        }

        // ================================================================
        // 8.  ВКЛАДКИ
        // ================================================================

        document.querySelectorAll('.tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // ================================================================
        // 9.  ЗАПУСК
        // ================================================================

        const loaded = load();

        if (!loaded || state.dialogs.length === 0) {
            addDialog('🚔 ОМВД Барвиха-Северное', 'Добро пожаловать на службу! Раскрывай дела, повышай ранг, зарабатывай.');
            addDialog('📞 Мухич', 'Привет! Жду тебя в отделе, есть дело!');
            addDialog('👮 Яковлев', 'Новичок? Не подведи. Устав — святое.');
            addDialog('🎯 Гриша', 'Брат, я в деле. Погнали!');
            if (state.money === 0) state.money = 5000;
            save();
        }

        renderAll();

        // Автосохранение
        setInterval(() => { save(); }, 30000);

        console.log('🚔 ОМВД Барвиха-Северное загружен!');
        console.log(`📋 ${CRIMES.length} дел, ${CARS.length} машин, ${MUHICH.length + YAKOVLEV.length + GRISHA.length} диалогов`);
        console.log('💾 Автосохранение каждые 30 секунд');
    </script>
</body>
</html>
