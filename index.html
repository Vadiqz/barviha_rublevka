<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ОМВД | Система управления Барвихой</title>
    <style>
        :root { --primary: #0f172a; --secondary: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background: var(--primary); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        
        /* Боковая панель управления */
        #nav { width: 250px; background: var(--secondary); height: 100vh; padding: 20px; border-right: 1px solid #334155; }
        .nav-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #334155; border: none; color: white; cursor: pointer; border-radius: 5px; text-align: left; }
        .nav-btn:hover { background: var(--accent); color: #000; }

        /* Рабочая область */
        #dashboard { flex: 1; padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .module { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        
        .stat-val { font-size: 24px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div id="nav">
    <h3>📱 ОМВД Барвиха</h3>
    <button class="nav-btn" onclick="showModule('tasks')">🚨 Оперативные дела</button>
    <button class="nav-btn" onclick="showModule('inventory')">📦 Склад вещдоков</button>
    <button class="nav-btn" onclick="showModule('budget')">🏛️ Кабинет начальника</button>
    <button class="nav-btn" onclick="showModule('garage')">🚗 Автопарк</button>
</div>

<div id="dashboard">
    <div class="module">
        <h3>Состояние отдела</h3>
        <p>Рейтинг раскрываемости: <span class="stat-val">84%</span></p>
        <p>Бюджет на премии: <span class="stat-val" id="b-val">5,000,000</span> ₽</p>
    </div>
    
    <div class="module" id="content-area">
        <h1>Добро пожаловать в систему</h1>
        <p>Выберите модуль из меню слева для начала работы.</p>
    </div>
</div>

<script>
    const db = {
        tasks: [
            { id: 1, name: "Облава на мажоров", type: "force", reward: 150000 },
            { id: 2, name: "Кража черной икры", type: "investigation", reward: 80000 },
            { id: 3, name: "Драка в ресторане", type: "force", reward: 120000 }
        ]
    };

    function showModule(mod) {
        const area = document.getElementById('content-area');
        if(mod === 'tasks') {
            area.innerHTML = "<h2>Текущие задачи:</h2>" + 
                db.tasks.map(t => `<div style="margin-bottom:10px;">${t.name} <button onclick="accept('${t.name}')">Принять</button></div>`).join('');
        } else if(mod === 'budget') {
            area.innerHTML = "<h2>Управление бюджетом</h2><p>Потратить 500к на ремонт?</p><button>Подтвердить</button>";
        }
    }
</script>
</body>
</html>
