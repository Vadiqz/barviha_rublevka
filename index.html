<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИАС ОМВД Барвиха-Северное</title>
    <style>
        :root {
            --dark-bg: #06080c;
            --bg-card: #0f131a;
            --border: #1b222d;
            --blue: #007aff;
            --red: #ff3b30;
            --text: #ffffff;
            --gray: #8e8e93;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            scroll-behavior: smooth; -webkit-tap-highlight-color: transparent;
        }

        body { background-color: var(--dark-bg); color: var(--text); padding-bottom: 50px; }

        .audio-widget {
            position: fixed; top: 12px; right: 12px; z-index: 2000;
            background: rgba(15, 19, 26, 0.95); border: 1px solid var(--border);
            padding: 10px 16px; border-radius: 8px; font-size: 11px; font-weight: bold;
            cursor: pointer;
        }

        .main-hero {
            height: 40vh; display: flex; align-items: center; padding: 24px;
            background: linear-gradient(180deg, rgba(0,0,0,0.1), var(--dark-bg)), 
                        url('https://kinorium.com') no-repeat center center/cover;
        }
        .gov-badge { color: var(--blue); font-size: 10px; font-weight: 800; letter-spacing: 1.5px; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .main-hero h1 { font-size: 26px; font-weight: 900; }
        .main-hero p { font-size: 13px; color: var(--gray); margin-top: 4px; }

        .portal-nav {
            position: sticky; top: 0; z-index: 1000; background: rgba(6, 8, 12, 0.95);
            backdrop-filter: blur(10px); display: flex; border-bottom: 1px solid var(--border);
        }
        .nav-item { flex: 1; text-align: center; color: var(--gray); text-decoration: none; padding: 16px 5px; font-size: 13px; font-weight: 600; }

        .container { padding: 0 16px; }
        .portal-section { padding-top: 35px; }
        .section-header { font-size: 18px; font-weight: 700; border-left: 4px solid var(--blue); padding-left: 12px; }
        .section-desc { font-size: 12px; color: var(--gray); margin: 6px 0 15px; }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
        .data-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; }
        .data-card:active { border-color: var(--blue); background: #151b26; }
        .img-wrapper { height: 260px; background-size: cover; background-position: center top; }
        .card-details { padding: 16px; }
        .status-tag { font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; }
        .tag-red { color: var(--red); }
        .tag-blue { color: #5ac8fa; }
        .data-card h3 { font-size: 16px; margin-top: 4px; }
        .data-card p { font-size: 12px; color: var(--gray); }

        .search-box input {
            width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; color: #fff; margin: 15px 0; font-size: 14px;
        }
        .cases-list { max-height: 250px; overflow-y: scroll; display: flex; flex-direction: column; gap: 8px; background: #030406; padding: 8px; border-radius: 8px; }
        .case-row { background: var(--bg-card); padding: 12px; border-radius: 6px; display: flex; gap: 12px; align-items: center; cursor: pointer; }
        .case-badge { background: #1b222d; color: var(--gray); font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .case-info h4 { font-size: 13px; color: #fff; }
        .case-info p { font-size: 11px; color: var(--gray); }

        .kusp-form { background: var(--bg-card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); margin: 15px 0; }
        .kusp-form h3 { font-size: 14px; margin-bottom: 10px; color: var(--blue); }
        .kusp-form input { width: 100%; padding: 10px; background: var(--dark-bg); border: 1px solid var(--border); border-radius: 6px; color:#fff; font-size:13px; margin-bottom: 10px; }
        .btn-primary { width: 100%; background: var(--blue); color: #fff; padding: 12px; border-radius: 6px; font-weight: bold; border: none; font-size: 13px; cursor: pointer; }

        .table-scroll { overflow-x: auto; background: var(--bg-card); border-radius: 14px; border: 1px solid var(--border); }
        .kusp-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; min-width: 500px; }
