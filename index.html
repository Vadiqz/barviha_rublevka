<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OMVD HUD | BARVIHA RP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap');
        
        body { 
            margin: 0; background: url('https://i.imgur.com/8FkP4Tf.jpg') no-repeat center center fixed; /* Можно заменить на фон Рублевки */
            background-size: cover; font-family: 'Roboto Condensed', sans-serif; color: white;
            overflow: hidden; display: flex; height: 100vh;
        }

        /* HUD Панель */
        .hud-left { width: 300px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); border-right: 2px solid #38bdf8; display: flex; flex-direction: column; }
        .hud-item { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }
        .hud-item:hover { background: rgba(56, 189, 248, 0.2); padding-left: 30px; border-left: 5px solid #38bdf8; }

        /* Контентная зона с анимацией */
        #main-view { flex: 1; padding: 50px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.6s; }
        .fade-in { opacity: 1 !important; }

        .card { background: rgba(30, 41, 59, 0.9); padding: 40px; border-radius: 0; border: 1px solid #475569; width: 600px; }
        .btn-game { background: transparent; border: 1px solid #38bdf8; color: #38bdf8; padding: 10px 20px; cursor: pointer; margin-top: 20px; }
        .btn-game:hover { background: #38bdf8; color: white; }
    </style>
</head>
<body>

<div class="hud-left">
    <div style="padding: 30px; font-weight: bold; font-size: 24px; color: #38bdf8;">ОМВД БАРВИХА</div>
    <div class="hud-item" onclick="navigate('missions')">🚨 Задания</div>
    <div class="hud-item" onclick="navigate('garage')">🚗 Автопарк</div>
    <div class="hud-item" onclick="navigate('admin')">🏛️ Управление</div>
</div>

<div id="main-view">
    <div class="card" id="content">
        <h1>Добро пожаловать в отдел</h1>
        <p>Выберите пункт меню для активации модуля.</p>
    </div>
</div>

<script>
    function navigate(mod) {
        const view = document.getElementById('main-view');
        const content = document.getElementById('content');
        
        // Эффект исчезновения
        view.classList.remove('fade-in');
        
        setTimeout(() => {
            if(mod === 'missions') {
                content.innerHTML = `<h1>Оперативные сводки</h1><button class="btn-game" onclick="alert('Запуск патруля...')">Начать патруль</button>`;
            } else if(mod === 'garage') {
                content.innerHTML = `<h1>Ваши Т/С</h1><p>Mercedes E-Class (Состояние: 100%)</p>`;
            }
            view.classList.add('fade-in');
        }, 500);
    }
</script>
</body>
</html>
