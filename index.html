<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Полицейский с Рублевки | RP</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Arial', sans-serif; }
        .hud { display: flex; justify-content: space-between; padding: 20px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #b91c1c; }
        .game-area { padding: 40px; text-align: center; }
        .map-road { width: 100%; height: 100px; background: #1f2937; position: relative; margin: 20px 0; border: 2px solid #374151; }
        .car-icon { position: absolute; left: 0; transition: 5s linear; font-size: 30px; }
        .btn-action { padding: 15px 30px; background: #b91c1c; color: white; border: none; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="hud">
    <div>Персонаж: <b id="char-name">Гриша Измайлов</b></div>
    <div>Баланс: <b id="money">50 000</b> ₽</div>
    <div>Статус: <b id="status">Свободен</b></div>
</div>

<div class="game-area">
    <div id="scene">
        <h1>Барвиха-Северное</h1>
        <p>Гриша, на вызов! Опять мажоры в Жуковке что-то натворили.</p>
        <button class="btn-action" onclick="startCase()">Выехать на Гелике</button>
    </div>
    <div class="map-road" id="road"><div class="car-icon" id="car">🚓</div></div>
</div>

<script>
    let player = { name: "Гриша Измайлов", money: 50000, status: "Свободен" };
    
    function startCase() {
        document.getElementById('status').innerText = "В пути";
        document.getElementById('car').style.left = "90%";
        
        setTimeout(() => {
            document.getElementById('scene').innerHTML = `
                <h2>Место: Жуковка</h2>
                <p>Нарушитель: Сын олигарха на Lamborghini. Ваши действия?</p>
                <button onclick="endCase(true)">Оформить по полной</button>
                <button onclick="endCase(false)">Взять «на лапу» (50к)</button>
            `;
        }, 5000);
    }

    function endCase(legal) {
        if(legal) {
            player.money += 10000;
            alert("Яковлев: 'Молодец, Измайлов! Премия — 10к.'");
        } else {
            player.money += 50000;
            alert("Гриша: 'Всё, прощай, мажор'. +50к на счет.");
        }
        document.getElementById('money').innerText = player.money;
        document.getElementById('scene').innerHTML = "<h1>Смена окончена</h1><button onclick='location.reload()'>Новый день</button>";
    }
</script>
</body>
</html>
